    // --- 画面3: ターゲット設定 ---
    const TargetSetup = ({ onNavigate, planState, setPlanState }) => {

      const toggleItem = (arr, item) => {
        const updated = arr.includes(item) ? arr.filter(i => i !== item) : [...arr, item];

      };

      const handleLevelChange = (level) => {
        setPlanState(prev => ({

      const handleStateChange = (state) => {
        setPlanState(prev => ({
          ...prev,

        }));
      };

      const handleRoleChange = (role) => {
        setPlanState(prev => ({
          ...prev,
          roles: toggleItem(prev.roles, role)
        }));
      };

      const handleStatePreset = (states) => {
        setPlanState(prev => ({ ...prev, states }));

      // Calculate filtered universities based on planState
      const filteredUnis = ALL_UNIVERSITIES.filter(u =>
        planState.levels.includes(u.level) && planState.states.includes(u.state)

      const totalCoaches = filteredUnis.reduce((sum, u) => {

        planState.roles.forEach(role => {

                </div>

        planState.levels.includes(u.level) && planState.states.includes(u.state)
      );

      // Calculate total by tier
      const tierBreakdown = {};
      let totalPrice = 0;
      filteredUnis.forEach(u => {

        if (!tierBreakdown[tier.label]) {

    const DetailView = ({ onNavigate }) => {
      const activePackage = {
        id: 1, level: "D1", roles: "HC, Asst", states: "CA, AZ, FL", targets: 12, coachCount: 68,
        stats: { pending: 5, sent: 30, opened: 20, replied: 8, error: 5 },
      };

      return (
        <div className="min-h-screen" style={{ backgroundColor: THEME.chalk }}>
          <Nav right="" onNavigate={onNavigate} />
          <div className="max-w-6xl mx-auto px-4 py-8">
            <button onClick={() => onNavigate("dashboard")} className="mb-6 px-4 py-2 rounded-lg border hover:bg-gray-50 font-medium">← 戻る</button>

            <div className="bg-white rounded-xl shadow-sm border p-6 mb-6">
              <h2 className="text-2xl font-bold mb-4" style={{ color: THEME.navy }}>プラン詳細</h2>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div className="text-center">
                  <div className="font-bold text-lg" style={{ color: THEME.navy }}>{activePackage.targets}</div>
                  <div className="text-sm text-gray-500">対象校</div>
                </div>
                <div className="text-center">
                  <div className="font-bold text-lg" style={{ color: THEME.navy }}>{activePackage.coachCount}</div>
                  <div className="text-sm text-gray-500">配信先</div>
                </div>
                <div className="text-center">
                  <div className="font-bold text-lg" style={{ color: THEME.navy }}>{activePackage.stats.sent}</div>
                  <div className="text-sm text-gray-500">配信済</div>
                </div>
                <div className="text-center">
                  <div className="font-bold text-lg" style={{ color: THEME.navy }}>{activePackage.stats.replied}</div>
                  <div className="text-sm text-gray-500">反応</div>
                </div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm border p-6">
              <h3 className="font-bold mb-4" style={{ color: THEME.navy }}>配信履歴</h3>
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="border-b">
                      <th className="text-left py-2 px-3">大学</th>
                      <th className="text-left py-2 px-3">コーチ</th>
                      <th className="text-left py-2 px-3">ステータス</th>
                      <th className="text-left py-2 px-3">送信日時</th>
                    </tr>
                  </thead>
                  <tbody>
                    {SAMPLE_DELIVERIES.map((d, i) => (
                      <tr key={i} className="border-b hover:bg-gray-50">
                        <td className="py-3 px-3 font-medium">{d.university}</td>
                        <td className="py-3 px-3">{d.coach}</td>
                        <td className="py-3 px-3">
                          <Badge color={d.status === "opened" ? "purple" : d.status === "replied" ? "orange" : "green"}>
                            {d.status}
                          </Badge>
                        </td>
                        <td className="py-3 px-3 text-gray-500">{d.sentAt}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- 画面9: DB管理 ---
    const DBManage = ({ onNavigate }) => {
      return (
        <div className="min-h-screen" style={{ backgroundColor: THEME.chalk }}>
          <Nav right="" onNavigate={onNavigate} />
          <div className="max-w-6xl mx-auto px-4 py-8">
            <button onClick={() => onNavigate("dashboard")} className="mb-6 px-4 py-2 rounded-lg border hover:bg-gray-50 font-medium">← ダッシュボードに戻る</button>

            <div className="bg-white rounded-xl shadow-sm border p-6">
              <h2 className="text-2xl font-bold mb-6" style={{ color: THEME.navy }}>📊 データベース管理</h2>

              <div className="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
                {Object.entries(LEVEL_STATS).map(([level, info]) => (
                  <div key={level} className="text-center p-4 rounded-lg" style={{ backgroundColor: info.color + "10", border: `2px solid ${info.color}` }}>
                    <div className="text-sm font-bold mb-1" style={{ color: info.color }}>{level}</div>
                    <div className="text-3xl font-bold" style={{ color: info.color }}>{info.schools}</div>
                    <div className="text-xs text-gray-500">学校</div>
                  </div>
                ))}
              </div>

              <h3 className="font-bold text-lg mb-4" style={{ color: THEME.navy }}>最新更新情報</h3>
              <div className="space-y-3">
                <div className="p-4 border rounded-lg">
                  <div className="font-bold">D1データ更新</div>
                  <div className="text-sm text-gray-600">2026年3月1日</div>
                </div>
                <div className="p-4 border rounded-lg">
                  <div className="font-bold">D2/D3データ追加</div>
                  <div className="text-sm text-gray-600">2026年2月28日</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ===== メインアプリケーション =====
    const App = () => {
      const [currentScreen, setCurrentScreen] = useState("login");
      const [planState, setPlanState] = useState({
        levels: ["D1"],
        states: ["CA", "TX", "FL"],
        roles: ["hc", "asst"],
        rankings: "全て",
        templateId: 1,
        startDate: "",
        excluded: []
      });

      const onNavigate = (screen) => setCurrentScreen(screen);

      return (
        <>
          {currentScreen === "login" && <LoginScreen onNavigate={onNavigate} />}
          {currentScreen === "dashboard" && <Dashboard onNavigate={onNavigate} />}
          {currentScreen === "target" && <TargetSetup onNavigate={onNavigate} planState={planState} setPlanState={setPlanState} />}
          {currentScreen === "confirm" && <TargetConfirm onNavigate={onNavigate} planState={planState} />}
          {currentScreen === "template" && <TemplateSetup onNavigate={onNavigate} planState={planState} setPlanState={setPlanState} />}
          {currentScreen === "schedule" && <ScheduleSetup onNavigate={onNavigate} planState={planState} setPlanState={setPlanState} />}
          {currentScreen === "payment" && <PaymentScreen onNavigate={onNavigate} planState={planState} />}
          {currentScreen === "detail" && <DetailView onNavigate={onNavigate} />}
          {currentScreen === "dbmanage" && <DBManage onNavigate={onNavigate} />}
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
