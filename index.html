      }, []);

      const doCopy = useCallbackQA(async (f, v) => {
        if (!v) return;
        try { await navigator.clipboard.writeText(v); setCopied(f); setTimeout(()=>setCopied(null),1000); } catch(e) {}
      }, []);

      const doEdit = useCallbackQA((f, v) => {
        setDataQA(prev => {
          const n = JSON.parse(JSON.stringify(prev));
          n[player][section][f] = v;
          saveData(n);
          return n;
        });
      }, [player, section, saveData]);

      const d = data[player];
      const fields = d[section] ? Object.keys(d[section]) : [];
      const isY = player === "yamato";
      const ac = isY ? "#6366f1" : "#d97706";
      const panelBg = darkMode ? "#0f1225" : "#ffffff";
      const fieldBg = darkMode ? "#131730" : "#f8fafc";
      const fieldBorder = darkMode ? "#1d2242" : "#e2e8f0";
      const labelColor = darkMode ? "#6b7294" : "#94a3b8";
      const valueColor = darkMode ? "#e0e4f0" : "#1e293b";

      return (
        <div style={{ position:"fixed", bottom:0, left:0, right:0, height:"55vh", background:panelBg, borderTop:`2px solid ${ac}`, boxShadow:"0 -4px 24px rgba(0,0,0,0.2)", zIndex:70, display:"flex", flexDirection:"column", borderRadius:"16px 16px 0 0", overflow:"hidden" }}>
          {/* パネルヘッダー */}
          <div style={{ background: darkMode ? "#0a0d1a" : "#f1f5f9", padding:"8px 12px", borderBottom:`1px solid ${fieldBorder}`, display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
            <span style={{ fontWeight:800, fontSize:14, color: darkMode ? "#f0f2fa" : "#1e293b" }}>⚾ QA-Fill</span>
            {msg && <span style={{ fontSize:11, color:"#22c55e", fontWeight:700 }}>{msg}</span>}
            <div style={{ flex:1 }} />
            {/* 選手切替 */}
            {[{id:"yamato",l:"ヤマト",c:"#6366f1"},{id:"takeru",l:"タケル",c:"#d97706"}].map(p => (
              <button key={p.id} onClick={() => setPlayer(p.id)} style={{ padding:"5px 14px", border:"none", borderRadius:6, cursor:"pointer", fontSize:12, fontWeight:700, background: player===p.id ? p.c : "transparent", color: player===p.id ? "#fff" : "#94a3b8", transition:"all 0.15s" }}>{p.l}</button>
            ))}
            <button onClick={onClose} style={{ background:"transparent", border:"none", cursor:"pointer", fontSize:18, color:"#94a3b8", padding:"0 4px" }}>✕</button>
          </div>

          {/* セクションタブ */}
          <div style={{ display:"flex", gap:2, padding:"6px 10px", overflowX:"auto", flexShrink:0, background: darkMode ? "#0f1225" : "#f8fafc", borderBottom:`1px solid ${fieldBorder}` }}>
            {Object.entries(QA_SECTIONS).map(([k,l]) => (
              <button key={k} onClick={() => setSectionQA(k)} style={{ padding:"4px 10px", border:"none", borderRadius:5, cursor:"pointer", fontSize:10, fontWeight:700, whiteSpace:"nowrap", background: section===k ? (isY?"rgba(99,102,241,0.15)":"rgba(217,119,6,0.15)") : "transparent", color: section===k ? ac : "#94a3b8" }}>{l}</button>
            ))}
          </div>

          {/* フィールドリスト */}
          <div style={{ flex:1, overflowY:"auto", padding:"6px 10px 8px" }}>
            {fields.map(f => {
              const v = d[section][f] || "";
              const lbl = QA_LABELS[f] || f;
              const isCopied = copied === f;
              const isEditing = editing === f;
              const empty = !v;
              return (
                <div key={f} style={{ display:"flex", alignItems:"center", gap:5, background: empty ? (darkMode?"rgba(220,38,38,0.05)":"#fff5f5") : fieldBg, border:`1px solid ${isCopied ? ac : empty ? "rgba(220,38,38,0.2)" : fieldBorder}`, borderRadius:6, padding:"5px 8px", marginBottom:3 }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:9, color:labelColor, fontWeight:700, textTransform:"uppercase" }}>{lbl}</div>
                    {isEditing ? (
                      <input autoFocus value={v} onChange={e => doEdit(f, e.target.value)} onBlur={() => setEditing(null)} onKeyDown={e => { if(e.key==="Enter") setEditing(null); }}
                        style={{ width:"100%", padding:"2px 4px", border:`1px solid ${ac}`, borderRadius:3, background: darkMode?"#080b16":"#fff", color: darkMode?"#eef0f6":"#1e293b", fontSize:11, fontFamily:"monospace", outline:"none", boxSizing:"border-box" }} />
                    ) : (
                      <div onClick={() => { if(empty) setEditing(f); }} style={{ fontSize:11, fontFamily: v ? "monospace" : "inherit", color: empty ? "#ef4444" : v.startsWith("http") ? "#60a5fa" : valueColor, fontStyle: empty ? "italic" : "normal", wordBreak:"break-all", cursor: empty ? "pointer" : "default" }}>
                        {v || "⚠ tap to fill"}
                      </div>
                    )}
                  </div>
                  <button onClick={() => setEditing(f)} style={{ width:24, height:24, border:`1px solid ${fieldBorder}`, borderRadius:4, background: darkMode?"#1e2340":"#f1f5f9", color:"#94a3b8", cursor:"pointer", fontSize:10 }}>✏</button>
                  <button onClick={() => doCopy(f, v)} disabled={!v} style={{ width:24, height:24, border:`1px solid ${isCopied ? ac : fieldBorder}`, borderRadius:4, background: isCopied ? ac : v ? (darkMode?"#1e2340":"#f1f5f9") : "transparent", color: isCopied ? "#fff" : v ? "#64748b" : "#cbd5e1", cursor: v ? "pointer" : "not-allowed", fontSize:10 }}>{isCopied?"✓":"📋"}</button>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    const App = () => {
      const [currentScreen, setCurrentScreen] = useState("login");
      const [themeId, setThemeId] = useState("classic");
      const [darkMode, setDarkMode] = useState(false);
      const [qaOpen, setQaOpen] = useState(false);
      const [planState, setPlanState] = useState({
        levels: ["D1"],
        states: ["CA", "TX", "FL"],
        roles: ["hc", "asst"],
        rankings: "全て",
        templateId: 1,
        startDate: "",
        excluded: []
      });

      // テーマ切り替え
      const changeTheme = (id) => {
        THEME = { ...THEME_PRESETS[id] };  // 新オブジェクトに再代入してReactが変化を検知
        setThemeId(id);
      };

      const onNavigate = (screen) => setCurrentScreen(screen);

      return (
        <>
          {currentScreen === "login" && <LoginScreen onNavigate={onNavigate} />}
          {currentScreen === "dashboard" && <Dashboard onNavigate={onNavigate} themeId={themeId} changeTheme={changeTheme} darkMode={darkMode} setDarkMode={setDarkMode} qaOpen={qaOpen} setQaOpen={setQaOpen} />}
          {currentScreen === "target" && <TargetSetup onNavigate={onNavigate} planState={planState} setPlanState={setPlanState} />}
          {currentScreen === "confirm" && <TargetConfirm onNavigate={onNavigate} planState={planState} />}
          {currentScreen === "template" && <TemplateSetup onNavigate={onNavigate} planState={planState} setPlanState={setPlanState} />}
          {currentScreen === "schedule" && <ScheduleSetup onNavigate={onNavigate} planState={planState} setPlanState={setPlanState} />}
          {currentScreen === "payment" && <PaymentScreen onNavigate={onNavigate} planState={planState} />}
          {currentScreen === "detail" && <DetailView onNavigate={onNavigate} />}
          {currentScreen === "dbmanage" && <DBManage onNavigate={onNavigate} />}
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
