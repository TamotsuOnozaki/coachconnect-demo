        setPlanState(prev => ({
          ...prev,
          levels: toggleItem(prev.levels, level)
        }));

        setPlanState(prev => ({
          ...prev,
          states: toggleItem(prev.states, state)
        }));
      };

      const handleRoleChange = (role) => {
        setPlanState(prev => ({
          ...prev,
          roles: toggleItem(prev.roles, role)
        }));
      };

      const handleStatePreset = (states) => {
        setPlanState(prev => ({ ...prev, states }));

      // Calculate filtered universities based on planState
      const filteredUnis = ALL_UNIVERSITIES.filter(u =>
        planState.levels.includes(u.level) && planState.states.includes(u.state)

              <rect x="8" y="36" width="104" height="7" rx="2" fill="#fef9c3" stroke="#fbbf24" strokeWidth="1.5" />
              <text x="12" y="43" fontSize="7" fill="#92400e">Yamato Onozaki  ✓</text>
              <rect x="8" y="49" width="60" height="7" rx="2" fill={darkMode?"#2d3555":"#d1d5db"} />
              <rect x="8" y="61" width="104" height="7" rx="2" fill="#fef9c3" stroke="#fbbf24" strokeWidth="1.5" />
              <text x="12" y="68" fontSize="7" fill="#92400e">+81 807-743-7530  ✓</text>
            </svg>
          )
        },
      ];

      return (
        <div style={{ position:"fixed", bottom:0, left:0, right:0, height:"80vh", background:panelBg, borderTop:`2px solid ${accentColor}`, boxShadow:"0 -4px 24px rgba(0,0,0,0.2)", zIndex:70, display:"flex", flexDirection:"column", borderRadius:"16px 16px 0 0", overflow:"hidden" }}>
          {/* ヘッダー */}
          <div style={{ background: darkMode ? "#0a0d1a" : "#fffbeb", padding:"12px 16px", borderBottom:`1px solid ${borderColor}`, display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
            <span style={{ fontSize:18 }}>📋</span>
            <div style={{ flex:1 }}>
              <div style={{ fontWeight:800, fontSize:17, color:textColor }}>QA-Fill 使い方ガイド</div>
              <div style={{ fontSize:12, color:subColor, marginTop:2 }}>大学アンケートをワンクリックで自動入力できます</div>
            </div>
            <button onClick={onClose} style={{ background:"transparent", border:"none", cursor:"pointer", fontSize:18, color:"#94a3b8", padding:"0 4px" }}>✕</button>
          </div>

          {/* ステップ一覧 スクロール可能 */}
          <div style={{ flex:1, overflowY:"auto", padding:"12px 12px 8px" }}>
            {steps.map((step, i) => (
              <div key={i} style={{ display:"flex", gap:12, marginBottom:16, alignItems:"flex-start" }}>
                {/* SVGイラスト */}
                <div style={{ flexShrink:0, borderRadius:10, overflow:"hidden", border:`1px solid ${borderColor}` }}>
                  {step.svg}
                </div>
                {/* テキスト */}
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:15, fontWeight:800, color:textColor, marginBottom:4 }}>{step.title}</div>
                  <div style={{ fontSize:13, color:subColor, lineHeight:1.7 }}>{step.desc}</div>
                </div>
              </div>
            ))}

            {/* ポイント補足 */}
            <div style={{ background: darkMode?"rgba(245,158,11,0.08)":"#fffde7", border:`1px solid ${accentColor}44`, borderRadius:8, padding:"10px 12px", marginBottom:12 }}>
              <div style={{ fontSize:13, fontWeight:700, color:accentColor, marginBottom:6 }}>💡 ポイント</div>
              <div style={{ fontSize:12, color:subColor, lineHeight:1.9 }}>
                ・ブックマーク登録は最初の1回だけ<br/>
                ・ヤマト用・タケル用を別々に保存可能<br/>
                ・フォームの項目名を自動認識して入力します<br/>
                ・黄色ハイライトで入力済み項目を確認できます
              </div>
            </div>
          </div>

          {/* 下部ボタン */}
          <div style={{ padding:"10px 12px 16px", borderTop:`1px solid ${borderColor}`, flexShrink:0, background:panelBg, display:"flex", gap:8 }}>
            <button onClick={onStart} style={{
              flex:1, padding:"13px 0", border:"none", borderRadius:10, cursor:"pointer",
              background:`linear-gradient(135deg, ${accentColor} 0%, #d97706 100%)`,
              color:"#fff", fontSize:14, fontWeight:800, fontFamily:"inherit",
              boxShadow:`0 4px 14px ${accentColor}55`
            }}>
              わかった！ Fill を開始 →
            </button>
          </div>
        </div>
      );
    };

    // ===== QA-Fill パネルコンポーネント =====
    const QA_SECTIONS = { personal:"Personal", parent:"Parent", academic:"Academic", athletic:"Athletic", club:"Club", links:"Links" };

    const QA_DEFAULT = {
      yamato: {
        personal: { firstName:"Yamato", lastName:"Onozaki", preferredName:"Yamato", country:"Japan", addressType:"Home", street:"3-1-17 Yawata, Tagajo, Miyagi", city:"Tagajo", state:"Miyagi", zip:"9850874", gradYear:"2026", dob:"12/27/2004", email:"yamato@prospect.zetalabo.biz", personalEmail:"y12271801@gmail.com", mobile:"+81 8077437530", instagram:"@y12271801", twitter:"" },
        parent: { p1FirstName:"Tamotsu", p1LastName:"Onozaki", p1Gender:"Male", p1Occupation:"CEO, Zeta Lab Inc.", p1Email:"onozaki@zetalabo.biz", p1LivingWith:"Yes", siblings:"Takeru Onozaki (Twin Brother, Same Age)", p2FirstName:"", p2LastName:"" },
        academic: { schoolName:"Genesee Community College", schoolCity:"Batavia", schoolState:"New York", gpa:"2.8", intendedMajor:"Health Science", eligibilityCenter:"Yes", eligibilityId:"", toefl:"" },
        athletic: { height:"6' 4\"", weight:"210", positions:"Right Handed Pitcher", throwingHand:"Right", battingHand:"Right", fbVelocity:"T88 mph (avg 86-87)", sliderVelocity:"76 mph", curveVelocity:"68-70 mph", era:"1.92", ip:"56", strikeouts:"62", confERA:"0.67 (1st in Conf.)", sixtyYard:"" },
        club: { clubName:"Tohoku Marks", clubCity:"Sendai" },
        links: { fieldLevel:"https://www.fieldlevel.com/app/profile/yamato.onozaki/baseball", youtube:"https://youtu.be/17LhHZvF4nU?t=180", fiveTool:"" }
      },
      takeru: {
        personal: { firstName:"Takeru", lastName:"Onozaki", preferredName:"Takeru", country:"Japan", addressType:"Home", street:"3-1-17 Yawata, Tagajo, Miyagi", city:"Tagajo", state:"Miyagi", zip:"9850874", gradYear:"2025", dob:"12/27/2004", email:"takeru@baseball.zetalabo.biz", personalEmail:"t12271801@gmail.com", mobile:"+81 7041005395", instagram:"@takeru_onozaki", twitter:"@takeru_onozaki" },
        parent: { p1FirstName:"Tamotsu", p1LastName:"Onozaki", p1Gender:"Male", p1Occupation:"CEO, Zeta Lab Inc.", p1Email:"onozaki@zetalabo.biz", p1LivingWith:"Yes", siblings:"Yamato Onozaki (Twin Brother, Same Age)", p2FirstName:"", p2LastName:"" },
        academic: { schoolName:"Southwestern Oregon Community College", schoolCity:"Coos Bay", schoolState:"Oregon", gpa:"3.35", intendedMajor:"Business / Information Systems", eligibilityCenter:"Yes", eligibilityId:"", toefl:"" },
        athletic: { height:"6' 4\"", weight:"200", positions:"RHP, Outfield (Two-Way)", throwingHand:"Right", battingHand:"Right", fbVelocity:"85-89 mph (topped 90)", sliderVelocity:"76 mph", curveVelocity:"68-70 mph", era:"3.09", ip:"67", strikeouts:"53", record:"4-3", whip:"1.35", ofArmVelocity:"92 mph", exitVelocity:"93 mph", sixtyYard:"7.25 sec" },
        club: { clubName:"Tohoku Marks", clubCity:"Sendai" },
        links: { fieldLevel:"https://www.fieldlevel.com/app/profile/takeru.onozaki/baseball", youtube:"https://youtu.be/3QO8xkjVij8?t=511", fiveTool:"https://fivetool.org/players/da3f180a-77f4-4e14-a970-b6dffb6d9577" }
      }
    };

    const QA_LABELS = {
      firstName:"First Name", lastName:"Last Name", preferredName:"Preferred Name", country:"Country", addressType:"Address Type", street:"Street", city:"City", state:"State", zip:"Zip", gradYear:"Grad Year", dob:"Date of Birth", email:"Email (Coach用)", personalEmail:"Email (個人)", mobile:"Mobile", instagram:"Instagram", twitter:"Twitter/X",
      p1FirstName:"Parent 1 名", p1LastName:"Parent 1 姓", p1Gender:"Parent 1 Gender", p1Occupation:"Parent 1 職業", p1Email:"Parent 1 Email", p1LivingWith:"Living With", siblings:"Siblings", p2FirstName:"Parent 2 名", p2LastName:"Parent 2 姓",
      schoolName:"School", schoolCity:"School City", schoolState:"School State", gpa:"GPA", intendedMajor:"Intended Major", eligibilityCenter:"NCAA Eligibility", eligibilityId:"Eligibility ID ⚠", toefl:"TOEFL",
      height:"Height", weight:"Weight (lbs)", positions:"Position(s)", throwingHand:"Throws", battingHand:"Bats", fbVelocity:"FB Velocity", sliderVelocity:"Slider", curveVelocity:"Curve", era:"ERA", ip:"IP", strikeouts:"K (Strikeouts)", confERA:"Conf. ERA", record:"Record", whip:"WHIP", ofArmVelocity:"OF Arm", exitVelocity:"Exit Velocity", sixtyYard:"60yd dash",
      clubName:"Club/Team", clubCity:"Club City",
      fieldLevel:"FieldLevel", youtube:"YouTube", fiveTool:"FiveTool"
    };

    const QAFillPanel = ({ onClose, darkMode }) => {
      const { useState: useStateQA, useEffect: useEffectQA, useCallback: useCallbackQA } = React;
      const [player, setPlayer] = useStateQA("yamato");
      const [section, setSectionQA] = useStateQA("personal");
      const [data, setDataQA] = useStateQA(QA_DEFAULT);
      const [copied, setCopied] = useStateQA(null);
      const [editing, setEditing] = useStateQA(null);
      const [msg, setMsg] = useStateQA("");

      // localStorage から読み込み
      useEffectQA(() => {
        try {
          const saved = localStorage.getItem("qa-fill-v1");
          if (saved) {
            const parsed = JSON.parse(saved);
            const merged = JSON.parse(JSON.stringify(QA_DEFAULT));
            ["yamato","takeru"].forEach(pl => {
              Object.keys(merged[pl]).forEach(s => {
                if (parsed[pl] && parsed[pl][s]) {
                  Object.entries(parsed[pl][s]).forEach(([k,v]) => { if(v) merged[pl][s][k]=v; });
                }
              });
            });
            setDataQA(merged);
          }
        } catch(e) {}
      }, []);

      const saveData = useCallbackQA((d) => {
        try { localStorage.setItem("qa-fill-v1", JSON.stringify(d)); setMsg("✓"); setTimeout(()=>setMsg(""),1000); } catch(e) {}
      }, []);

      const doCopy = useCallbackQA(async (f, v) => {
        if (!v) return;
        try { await navigator.clipboard.writeText(v); setCopied(f); setTimeout(()=>setCopied(null),1000); } catch(e) {}
      }, []);

      const doEdit = useCallbackQA((f, v) => {
        setDataQA(prev => {
          const n = JSON.parse(JSON.stringify(prev));
          n[player][section][f] = v;
          saveData(n);
          return n;
        });
      }, [player, section, saveData]);

      const d = data[player];
      const fields = d[section] ? Object.keys(d[section]) : [];
      const isY = player === "yamato";
      const ac = isY ? "#6366f1" : "#d97706";
      const panelBg = darkMode ? "#0f1225" : "#ffffff";
      const fieldBg = darkMode ? "#131730" : "#f8fafc";
      const fieldBorder = darkMode ? "#1d2242" : "#e2e8f0";
      const labelColor = darkMode ? "#6b7294" : "#94a3b8";
      const valueColor = darkMode ? "#e0e4f0" : "#1e293b";

      return (
        <div style={{ position:"fixed", bottom:0, left:0, right:0, height:"55vh", background:panelBg, borderTop:`2px solid ${ac}`, boxShadow:"0 -4px 24px rgba(0,0,0,0.2)", zIndex:70, display:"flex", flexDirection:"column", borderRadius:"16px 16px 0 0", overflow:"hidden" }}>
          {/* パネルヘッダー */}
          <div style={{ background: darkMode ? "#0a0d1a" : "#f1f5f9", padding:"8px 12px", borderBottom:`1px solid ${fieldBorder}`, display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
            <span style={{ fontWeight:800, fontSize:14, color: darkMode ? "#f0f2fa" : "#1e293b" }}>⚾ QA-Fill</span>
            {msg && <span style={{ fontSize:11, color:"#22c55e", fontWeight:700 }}>{msg}</span>}
            <div style={{ flex:1 }} />
            {/* 選手切替 */}
            {[{id:"yamato",l:"ヤマト",c:"#6366f1"},{id:"takeru",l:"タケル",c:"#d97706"}].map(p => (
              <button key={p.id} onClick={() => setPlayer(p.id)} style={{ padding:"5px 14px", border:"none", borderRadius:6, cursor:"pointer", fontSize:12, fontWeight:700, background: player===p.id ? p.c : "transparent", color: player===p.id ? "#fff" : "#94a3b8", transition:"all 0.15s" }}>{p.l}</button>
            ))}
            <button onClick={onClose} style={{ background:"transparent", border:"none", cursor:"pointer", fontSize:18, color:"#94a3b8", padding:"0 4px" }}>✕</button>
          </div>

          {/* セクションタブ */}
          <div style={{ display:"flex", gap:2, padding:"6px 10px", overflowX:"auto", flexShrink:0, background: darkMode ? "#0f1225" : "#f8fafc", borderBottom:`1px solid ${fieldBorder}` }}>
            {Object.entries(QA_SECTIONS).map(([k,l]) => (
              <button key={k} onClick={() => setSectionQA(k)} style={{ padding:"4px 10px", border:"none", borderRadius:5, cursor:"pointer", fontSize:10, fontWeight:700, whiteSpace:"nowrap", background: section===k ? (isY?"rgba(99,102,241,0.15)":"rgba(217,119,6,0.15)") : "transparent", color: section===k ? ac : "#94a3b8" }}>{l}</button>
            ))}
          </div>

          {/* フィールドリスト */}
          <div style={{ flex:1, overflowY:"auto", padding:"6px 10px 8px" }}>
            {fields.map(f => {
              const v = d[section][f] || "";
              const lbl = QA_LABELS[f] || f;
              const isCopied = copied === f;
              const isEditing = editing === f;
              const empty = !v;
              return (
                <div key={f} style={{ display:"flex", alignItems:"center", gap:5, background: empty ? (darkMode?"rgba(220,38,38,0.05)":"#fff5f5") : fieldBg, border:`1px solid ${isCopied ? ac : empty ? "rgba(220,38,38,0.2)" : fieldBorder}`, borderRadius:6, padding:"5px 8px", marginBottom:3 }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:9, color:labelColor, fontWeight:700, textTransform:"uppercase" }}>{lbl}</div>
                    {isEditing ? (
                      <input autoFocus value={v} onChange={e => doEdit(f, e.target.value)} onBlur={() => setEditing(null)} onKeyDown={e => { if(e.key==="Enter") setEditing(null); }}
                        style={{ width:"100%", padding:"2px 4px", border:`1px solid ${ac}`, borderRadius:3, background: darkMode?"#080b16":"#fff", color: darkMode?"#eef0f6":"#1e293b", fontSize:11, fontFamily:"monospace", outline:"none", boxSizing:"border-box" }} />
                    ) : (
                      <div onClick={() => { if(empty) setEditing(f); }} style={{ fontSize:11, fontFamily: v ? "monospace" : "inherit", color: empty ? "#ef4444" : v.startsWith("http") ? "#60a5fa" : valueColor, fontStyle: empty ? "italic" : "normal", wordBreak:"break-all", cursor: empty ? "pointer" : "default" }}>
                        {v || "⚠ tap to fill"}
                      </div>
                    )}
                  </div>
                  <button onClick={() => setEditing(f)} style={{ width:24, height:24, border:`1px solid ${fieldBorder}`, borderRadius:4, background: darkMode?"#1e2340":"#f1f5f9", color:"#94a3b8", cursor:"pointer", fontSize:10 }}>✏</button>
                  <button onClick={() => doCopy(f, v)} disabled={!v} style={{ width:24, height:24, border:`1px solid ${isCopied ? ac : fieldBorder}`, borderRadius:4, background: isCopied ? ac : v ? (darkMode?"#1e2340":"#f1f5f9") : "transparent", color: isCopied ? "#fff" : v ? "#64748b" : "#cbd5e1", cursor: v ? "pointer" : "not-allowed", fontSize:10 }}>{isCopied?"✓":"📋"}</button>
                </div>
              );
            })}
          </div>

          {/* ===== Bookmarklet取得ボタン ===== */}
          <div style={{ padding: "8px 10px 10px", borderTop: `1px solid ${fieldBorder}`, flexShrink: 0, background: panelBg }}>
            <button onClick={() => {
              const allFields = {};
              Object.values(d).forEach(sec => {
                if (typeof sec === "object") {
                  Object.entries(sec).forEach(([k, v]) => { if(v) allFields[k] = v; });
                }
              });
              const dataJson = JSON.stringify(allFields).replace(/"/g, '\"');
              const bmCode = `javascript:(function(){const data=JSON.parse("${dataJson}");const inputs=document.querySelectorAll('input,textarea,select');let filled=0;const map=[[['first','fname','firstname','given'],data.firstName],[['last','lname','lastname','family'],data.lastName],[['email'],data.email||data.personalEmail],[['phone','mobile','cell'],data.mobile],[['height','ht'],data.height],[['weight','wt','lbs'],data.weight],[['gpa'],data.gpa],[['major','study'],data.intendedMajor],[['position','pos'],data.positions],[['velocity','velo','fb'],data.fbVelocity],[['grad','class','year'],data.gradYear],[['city'],data.city],[['state'],data.state],[['zip','postal'],data.zip],[['country'],data.country],[['school','college'],data.schoolName],[['instagram','ig'],data.instagram],[['twitter'],data.twitter]];inputs.forEach(el=>{const ctx=((el.name||"")+(el.id||"")+(el.placeholder||"")).toLowerCase();const lbl=(el.closest?.('label')||el.parentElement?.querySelector?.('label')||{}).textContent||"";const full=(ctx+lbl).toLowerCase();for(const[keys,val]of map){if(!val)continue;if(keys.some(k=>full.includes(k))){if(el.tagName==="SELECT"){Array.from(el.options).forEach(o=>{if(o.text.toLowerCase().includes(val.toLowerCase()))el.value=o.value});}else{el.value=val;}el.dispatchEvent(new Event("input",{bubbles:true}));el.dispatchEvent(new Event("change",{bubbles:true}));el.style.outline="3px solid #f59e0b";filled++;break;}}});alert("QA-Fill: "+filled+"件を自動入力しました！");})()`;
              try {
                navigator.clipboard.writeText(bmCode);
                setMsg("🔗 コピー完了！");
                setTimeout(() => setMsg(""), 3000);
              } catch(e) {
                window.prompt("URLをコピーしてブックマークに追加", bmCode);
              }
            }} style={{
              width: "100%", padding: "10px", border: "none", borderRadius: 8,
              background: isY ? "rgba(99,102,241,0.15)" : "rgba(217,119,6,0.15)",
              color: ac, fontSize: 12, fontWeight: 700, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 6, fontFamily: "inherit"
            }}>
              🔗 フォーム自動入力ブックマークレットをコピー
            </button>

          </div>
        </div>
      );
    };

    const App = () => {
      const [currentScreen, setCurrentScreen] = useState("login");
      const [themeId, setThemeId] = useState("classic");
      const [darkMode, setDarkMode] = useState(false);
      const [qaOpen, setQaOpen] = useState(false);
      const [planState, setPlanState] = useState({
        levels: ["D1"],
        states: ["CA", "TX", "FL"],
        roles: ["hc", "asst"],
        rankings: "全て",
        templateId: 1,
        startDate: "",
        excluded: []
      });

      // テーマ切り替え
      const changeTheme = (id) => {
        THEME = { ...THEME_PRESETS[id] };  // 新オブジェクトに再代入してReactが変化を検知
        setThemeId(id);
      };

      const onNavigate = (screen) => setCurrentScreen(screen);

      return (
        <>
          {currentScreen === "login" && <LoginScreen onNavigate={onNavigate} />}
          {currentScreen === "dashboard" && <Dashboard onNavigate={onNavigate} themeId={themeId} changeTheme={changeTheme} darkMode={darkMode} setDarkMode={setDarkMode} qaOpen={qaOpen} setQaOpen={setQaOpen} />}
          {currentScreen === "target" && <TargetSetup onNavigate={onNavigate} planState={planState} setPlanState={setPlanState} />}
          {currentScreen === "confirm" && <TargetConfirm onNavigate={onNavigate} planState={planState} />}
          {currentScreen === "template" && <TemplateSetup onNavigate={onNavigate} planState={planState} setPlanState={setPlanState} />}
          {currentScreen === "schedule" && <ScheduleSetup onNavigate={onNavigate} planState={planState} setPlanState={setPlanState} />}
          {currentScreen === "payment" && <PaymentScreen onNavigate={onNavigate} planState={planState} />}
          {currentScreen === "detail" && <DetailView onNavigate={onNavigate} />}
          {currentScreen === "dbmanage" && <DBManage onNavigate={onNavigate} />}
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
