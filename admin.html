<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AthleteGate Admin - データベース管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', 'Hiragino Sans', sans-serif; background: #f0f2f5; }
    .table-row:hover { background-color: #f8fafc; }
    .filter-badge { transition: all 0.2s; }
    .filter-badge.active { transform: scale(1.05); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .stat-card { transition: transform 0.2s; }
    .stat-card:hover { transform: translateY(-2px); }
    #searchInput:focus { box-shadow: 0 0 0 3px rgba(59,130,246,0.3); }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Grid Map */
    .grid-map-wrap {
      position: relative; border-radius: 12px; padding: 20px; overflow: hidden;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }
    .grid-map-bg {
      position: absolute; inset: 0; opacity: 0.15;
      background: url('https://upload.wikimedia.org/wikipedia/commons/1/1a/Blank_US_Map_%28states_only%29.svg') center 55%/68% no-repeat;
      filter: brightness(3) contrast(0.5);
    }
    .grid-map { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; max-width: 660px; position: relative; z-index: 1; }
    .grid-cell {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; color: #fff; background: rgba(96,165,250,0.55);
      border-radius: 5px; cursor: pointer; transition: all 0.15s; user-select: none;
      border: 1px solid rgba(147,197,253,0.3); text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .grid-cell:hover { background: rgba(96,165,250,0.85); transform: scale(1.18); z-index: 2; box-shadow: 0 0 16px rgba(96,165,250,0.5); border-color: #93c5fd; }
    .grid-cell.active { background: #f59e0b; color: #fff; border-color: #fbbf24; box-shadow: 0 0 14px rgba(245,158,11,0.6); text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
    .grid-cell.has-data { background: rgba(59,130,246,0.7); border-color: rgba(147,197,253,0.5); color: #fff; }
    .grid-cell.has-data:hover { background: rgba(59,130,246,0.9); box-shadow: 0 0 16px rgba(59,130,246,0.5); }
    .grid-cell.has-data.active { background: #f59e0b; color: #fff; border-color: #fbbf24; box-shadow: 0 0 14px rgba(245,158,11,0.6); }
    .grid-cell.empty { visibility: hidden; pointer-events: none; }

    /* Tooltip */
    .map-tooltip {
      position: fixed; background: #1e293b; color: #fff; padding: 10px 14px;
      border-radius: 8px; font-size: 12px; pointer-events: none; z-index: 1000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25); display: none; line-height: 1.6;
    }
    .map-tooltip.visible { display: block; }
    .map-tooltip strong { font-size: 14px; }
    .map-tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; }
    .map-tooltip .tt-label { color: #94a3b8; }
    .map-tooltip .tt-val { font-weight: 700; }

    /* Selected badges */
    .sel-badges { display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 0; }
    .sel-badge {
      display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px;
      background: #3b82f6; color: #fff; border-radius: 20px; font-size: 11px;
      font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .sel-badge:hover { background: #1d4ed8; }

    /* Division toggle buttons */
    .div-btn.off { opacity: 0.3; box-shadow: none; transform: scale(0.95); }
    .div-btn:hover { transform: scale(1.08); }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen">
    <!-- ヘッダー -->
    <nav class="bg-slate-800 text-white shadow-lg">
      <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <span class="text-xl">⚾</span>
          <span class="text-lg font-bold">AthleteGate</span>
          <span class="text-xs bg-red-500 px-2 py-0.5 rounded-full font-bold">ADMIN</span>
        </div>
        <div class="flex items-center gap-4 text-sm">
          <a href="index.html" class="hover:text-blue-300 transition">← デモサイトへ</a>
          <span class="text-slate-400">|</span>
          <span class="text-slate-300" id="lastUpdate"></span>
        </div>
      </div>
    </nav>

    <!-- メインコンテンツ -->
    <div class="max-w-7xl mx-auto px-4 py-6">

      <!-- 統計バー -->
      <div class="bg-white rounded-xl shadow-sm p-4 mb-6 flex flex-wrap items-center gap-6">
        <div class="text-sm text-slate-600">データ内 <span class="text-2xl font-black text-slate-800" id="statTotal">-</span> 校</div>
        <div class="text-sm text-slate-400">→</div>
        <div class="text-sm text-slate-600">絞り込み結果 <span class="text-2xl font-black text-blue-600" id="statFiltered">-</span> 校</div>
        <div class="text-sm text-slate-400">|</div>
        <div class="text-sm text-slate-600">コーチ <span class="font-bold text-slate-800" id="statCoaches">-</span> 名</div>
      </div>

      <!-- 検索・フィルター -->
      <div class="bg-white rounded-xl shadow-sm p-5 mb-6">
        <div class="flex flex-col md:flex-row gap-4 mb-4">
          <!-- 検索ボックス -->
          <div class="flex-1 relative">
            <svg class="absolute left-3 top-3 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" placeholder="大学名、カンファレンス、州で検索..."
              class="w-full pl-10 pr-4 py-2.5 border rounded-lg text-sm focus:outline-none focus:border-blue-400">
          </div>
          <!-- Division フィルター（複数選択トグル・動的生成） -->
          <div class="flex gap-2 items-center flex-wrap">
            <span class="text-xs text-slate-500 font-bold">Division:</span>
            <div id="divButtonsContainer" class="flex gap-2 flex-wrap">
              <span class="text-xs text-slate-400">読み込み中...</span>
            </div>
          </div>
        </div>

        <!-- Grid Map Filter -->
        <div class="mb-4">
          <div class="flex justify-between items-center mb-2">
            <div class="text-xs text-slate-500 font-bold">州を選択（クリックで絞り込み）:</div>
            <div class="flex items-center gap-3">
              <span id="selectedCount" class="text-xs text-slate-500"></span>
              <button onclick="clearStates()" class="px-3 py-1 text-xs rounded-full font-medium bg-slate-200 text-slate-600 hover:bg-slate-300 transition">全州クリア</button>
            </div>
          </div>
          <div class="grid-map-wrap shadow-lg">
            <div class="grid-map-bg"></div>
            <div id="gridMap" class="grid-map mx-auto"></div>
          </div>
          <div id="selectedBadges" class="sel-badges mt-2"></div>
        </div>

        <!-- Conference フィルター -->
        <details class="mt-2">
          <summary class="text-xs text-slate-500 cursor-pointer hover:text-slate-700 font-bold">カンファレンス絞り込み ▼</summary>
          <div class="flex flex-wrap gap-1.5 mt-2" id="confFilters"></div>
        </details>
      </div>

      <!-- データテーブル -->
      <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <!-- ページネーション・表示件数セレクタ -->
        <div class="flex justify-between items-center px-4 py-3 border-b bg-slate-50">
          <div class="flex items-center gap-3">
            <span class="text-xs text-slate-500 font-bold">表示件数:</span>
            <select id="perPageSelect" onchange="changePerPage()" class="px-2 py-1 text-xs border rounded bg-white hover:bg-slate-50 cursor-pointer">
              <option value="10">10件</option>
              <option value="50" selected>50件</option>
              <option value="100">100件</option>
              <option value="9999">全件</option>
            </select>
          </div>
          <div class="text-xs text-slate-500" id="pageInfo"></div>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-slate-50 border-b">
                <th class="text-left px-4 py-3 text-xs font-bold text-slate-500 cursor-pointer hover:text-slate-800" onclick="sortBy('name')">大学名 ↕</th>
                <th class="text-center px-3 py-3 text-xs font-bold text-slate-500 cursor-pointer hover:text-slate-800" onclick="sortBy('level')">Div ↕</th>
                <th class="text-left px-3 py-3 text-xs font-bold text-slate-500 cursor-pointer hover:text-slate-800" onclick="sortBy('conf')">Conference ↕</th>
                <th class="text-center px-3 py-3 text-xs font-bold text-slate-500 cursor-pointer hover:text-slate-800" onclick="sortBy('state')">State ↕</th>
                <th class="text-center px-3 py-3 text-xs font-bold text-slate-500 cursor-pointer hover:text-slate-800" onclick="sortBy('coaches')">コーチ数 ↕</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <!-- ページネーション -->
        <div class="flex justify-between items-center px-4 py-3 border-t bg-slate-50">
          <div class="text-xs text-slate-500" id="tablePageInfo"></div>
          <div class="flex gap-2">
            <button onclick="changePage(-1)" class="px-3 py-1 text-xs rounded border hover:bg-slate-100" id="prevBtn">← 前へ</button>
            <button onclick="changePage(1)" class="px-3 py-1 text-xs rounded border hover:bg-slate-100" id="nextBtn">次へ →</button>
          </div>
        </div>
      </div>

      <!-- エクスポート -->
      <div class="mt-4 flex gap-3">
        <button onclick="exportCSV()" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-bold hover:bg-green-700 transition">
          📥 CSV出力
        </button>
        <button onclick="exportJSON()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition">
          📥 JSON出力
        </button>
      </div>
    </div>
  </div>

  <!-- Tooltip -->
  <div id="stateTooltip" class="map-tooltip"></div>

  <script>
    // ===== データ管理 =====
    let ALL_DATA = [];
    let filtered = [];
    let currentPage = 1;
    let PER_PAGE = 50;
    let currentSort = { key: 'name', asc: true };
    let activeDivs = new Set(['D1','D2','D3','NAIA']); // all selected by default
    let activeStates = new Set();
    let activeConfs = new Set();

    // State abbreviation to full name mapping
    const STATE_NAMES = {
      'AL': 'Alabama', 'AK': 'Alaska', 'AZ': 'Arizona', 'AR': 'Arkansas', 'CA': 'California',
      'CO': 'Colorado', 'CT': 'Connecticut', 'DE': 'Delaware', 'DC': 'District of Columbia', 'FL': 'Florida',
      'GA': 'Georgia', 'HI': 'Hawaii', 'ID': 'Idaho', 'IL': 'Illinois', 'IN': 'Indiana',
      'IA': 'Iowa', 'KS': 'Kansas', 'KY': 'Kentucky', 'LA': 'Louisiana', 'MA': 'Massachusetts',
      'MD': 'Maryland', 'ME': 'Maine', 'MI': 'Michigan', 'MN': 'Minnesota', 'MO': 'Missouri',
      'MS': 'Mississippi', 'MT': 'Montana', 'NC': 'North Carolina', 'ND': 'North Dakota', 'NE': 'Nebraska',
      'NH': 'New Hampshire', 'NJ': 'New Jersey', 'NM': 'New Mexico', 'NV': 'Nevada', 'NY': 'New York',
      'OH': 'Ohio', 'OK': 'Oklahoma', 'OR': 'Oregon', 'PA': 'Pennsylvania', 'RI': 'Rhode Island',
      'SC': 'South Carolina', 'SD': 'South Dakota', 'TN': 'Tennessee', 'TX': 'Texas', 'UT': 'Utah',
      'VA': 'Virginia', 'VT': 'Vermont', 'WA': 'Washington', 'WI': 'Wisconsin', 'WV': 'West Virginia', 'WY': 'Wyoming'
    };

    // Grid map layout (row, col) - geographic tile layout like NYT/FiveThirtyEight
    const GRID_LAYOUT = [
      [null,null,null,null,null,null,null,null,null,null,'ME',null],
      ['WA',null,null,null,null,'WI',null,null,null,'VT','NH',null],
      ['OR','ID','MT','ND','MN','IL','MI',null,'NY','MA',null,null],
      ['CA','NV','WY','SD','IA','IN','OH','PA','NJ','CT','RI',null],
      [null,'UT','CO','NE','MO','KY','WV','VA','MD','DE',null,null],
      [null,'AZ','NM','KS','AR','TN','NC','SC','DC',null,null,null],
      [null,null,null,'OK','LA','MS','AL','GA',null,null,null,null],
      ['AK',null,'HI','TX',null,null,null,'FL',null,null,null,null],
    ];

    // データ読み込み（Google Sheets gviz APIからライブ取得）
    const SHEET_ID = '1EZlrh_Gws65PSJLJYBLBtlmtzvUrBNZ8ORMGXNtB9HM';
    const SHEET_GID = '919719835';

    async function loadData() {
      try {
        // Google Sheets gviz APIから最新データ取得
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${SHEET_GID}`;
        const res = await fetch(url);
        const text = await res.text();
        const match = text.match(/google\.visualization\.Query\.setResponse\((.+)\)/s);
        if (!match) throw new Error('gviz parse failed');
        const gviz = JSON.parse(match[1]);

        // 大学レベルに集約（同じ大学+Divisionのコーチを合算）
        const uniMap = {};
        gviz.table.rows.forEach(r => {
          const div = r.c[1]?.v || '';
          const conf = r.c[2]?.v || '';
          const state = r.c[3]?.v || '';
          const uni = r.c[4]?.v || '';
          if (!uni) return;
          const key = uni + '|' + div;
          if (!uniMap[key]) uniMap[key] = { name: uni, level: div, conf, state, coaches: 0 };
          uniMap[key].coaches++;
        });
        ALL_DATA = Object.values(uniMap);

        // Division一覧を動的に取得してボタン生成
        const divs = [...new Set(ALL_DATA.map(u => u.level))].sort();
        activeDivs = new Set(divs);
        buildDivButtons(divs);

        document.getElementById('lastUpdate').textContent = '同期: ' + new Date().toLocaleString('ja-JP', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
        initMap();
        initFilters();
        applyFilters();
      } catch (e) {
        console.error('Live fetch failed, falling back to data.json:', e);
        // フォールバック: data.jsonから読み込み
        try {
          const res2 = await fetch('data.json');
          const json = await res2.json();
          if (Array.isArray(json)) { ALL_DATA = json; }
          else { ALL_DATA = [...(json.d1||[]).map(u=>({...u,level:'D1'})), ...(json.d2||[]).map(u=>({...u,level:'D2'}))]; }
          const divs = [...new Set(ALL_DATA.map(u => u.level))].sort();
          activeDivs = new Set(divs);
          buildDivButtons(divs);
          document.getElementById('lastUpdate').textContent = 'オフライン（data.json）';
          initMap(); initFilters(); applyFilters();
        } catch (e2) {
          document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="p-8 text-center text-red-500">データの読み込みに失敗しました</td></tr>';
        }
      }
    }

    // Division ボタンを動的生成
    const DIV_COLORS = { D1:'bg-red-500', D2:'bg-blue-700', D3:'bg-green-600', NAIA:'bg-amber-600', HBCUD1:'bg-purple-600', HBCUD2:'bg-purple-400', JUCO:'bg-gray-600' };
    function buildDivButtons(divs) {
      const container = document.getElementById('divButtonsContainer');
      container.innerHTML = `<button onclick="toggleDiv('ALL')" id="divALL" class="div-btn px-3 py-1.5 rounded-full text-xs font-bold cursor-pointer transition-all bg-slate-700 text-white shadow">ALL</button>`;
      divs.forEach(d => {
        const color = DIV_COLORS[d] || 'bg-slate-500';
        container.innerHTML += `<button onclick="toggleDiv('${d}')" id="div${d}" class="div-btn px-3 py-1.5 rounded-full text-xs font-bold cursor-pointer transition-all ${color} text-white shadow">${d}</button>`;
      });
      DIV_LIST.length = 0;
      divs.forEach(d => DIV_LIST.push(d));
    }

    // Initialize Grid Map
    function initMap() {
      const container = document.getElementById('gridMap');
      container.innerHTML = '';
      GRID_LAYOUT.forEach(row => {
        row.forEach(st => {
          const cell = document.createElement('div');
          if (!st) {
            cell.className = 'grid-cell empty';
          } else {
            const count = ALL_DATA.filter(u => u.state === st).length;
            cell.className = 'grid-cell' + (count > 0 ? ' has-data' : '');
            cell.textContent = st;
            cell.dataset.state = st;
            cell.addEventListener('click', () => toggleState(st));
            cell.addEventListener('mouseenter', (e) => showTooltip(st, e));
            cell.addEventListener('mousemove', (e) => moveTooltip(e));
            cell.addEventListener('mouseleave', hideTooltip);
          }
          container.appendChild(cell);
        });
      });
    }

    // Tooltip（全Division動的表示）
    function showTooltip(state, event) {
      const name = STATE_NAMES[state] || state;
      const stateUnis = ALL_DATA.filter(u => u.state === state);
      const byDiv = {};
      stateUnis.forEach(u => { byDiv[u.level] = (byDiv[u.level] || 0) + 1; });
      const tt = document.getElementById('stateTooltip');
      let html = `<strong>${name} (${state})</strong>`;
      DIV_LIST.forEach(d => {
        if (byDiv[d]) html += `<div class="tt-row"><span class="tt-label">${d}</span><span class="tt-val">${byDiv[d]}校</span></div>`;
      });
      const total = stateUnis.length;
      html += `<div class="tt-row" style="border-top:1px solid #374151;padding-top:4px;margin-top:2px"><span class="tt-label">合計</span><span class="tt-val">${total}校</span></div>`;
      tt.innerHTML = html;
      tt.classList.add('visible');
      moveTooltip(event);
    }
    function moveTooltip(e) {
      const tt = document.getElementById('stateTooltip');
      tt.style.left = (e.clientX + 12) + 'px';
      tt.style.top = (e.clientY - 10) + 'px';
    }
    function hideTooltip() {
      document.getElementById('stateTooltip').classList.remove('visible');
    }

    // フィルター初期化
    function initFilters() {
      const confs = [...new Set(ALL_DATA.map(u => u.conf))].sort();

      // Conference フィルターボタン
      const confDiv = document.getElementById('confFilters');
      confDiv.innerHTML = '<button onclick="clearConfs()" class="px-2 py-1 rounded text-xs bg-slate-200 text-slate-600 hover:bg-slate-300">全カンファレンス</button>' +
        confs.map(c => `<button onclick="toggleConf('${c}')" class="conf-btn px-2 py-1 rounded text-xs bg-slate-100 text-slate-600 hover:bg-blue-100" data-conf="${c}">${c}</button>`).join('');
    }

    // ===== Division トグル（複数選択） =====
    const DIV_LIST = []; // populated dynamically from data
    function toggleDiv(div) {
      if (div === 'ALL') {
        // 全選択 or 全解除
        const allOn = DIV_LIST.every(d => activeDivs.has(d));
        if (allOn) activeDivs.clear();
        else DIV_LIST.forEach(d => activeDivs.add(d));
      } else {
        if (activeDivs.has(div)) activeDivs.delete(div);
        else activeDivs.add(div);
      }
      updateDivButtons();
      currentPage = 1;
      applyFilters();
    }
    function updateDivButtons() {
      const allOn = DIV_LIST.every(d => activeDivs.has(d));
      const el = document.getElementById('divALL');
      el.classList.toggle('off', !allOn);
      DIV_LIST.forEach(d => {
        document.getElementById('div' + d).classList.toggle('off', !activeDivs.has(d));
      });
    }

    function toggleState(state) {
      if (activeStates.has(state)) activeStates.delete(state);
      else activeStates.add(state);
      updateMapStates();
      updateSelectedStatesBadges();
      currentPage = 1;
      applyFilters();
    }

    function clearStates() {
      activeStates.clear();
      updateMapStates();
      updateSelectedStatesBadges();
      currentPage = 1;
      applyFilters();
    }

    function updateMapStates() {
      document.querySelectorAll('.grid-cell[data-state]').forEach(cell => {
        cell.classList.toggle('active', activeStates.has(cell.dataset.state));
      });
    }

    function updateSelectedStatesBadges() {
      const container = document.getElementById('selectedBadges');
      const countSpan = document.getElementById('selectedCount');
      if (activeStates.size === 0) {
        container.innerHTML = '';
        countSpan.textContent = '';
      } else {
        const states = Array.from(activeStates).sort();
        container.innerHTML = states.map(s =>
          `<div class="sel-badge" onclick="toggleState('${s}')">${STATE_NAMES[s] || s} ×</div>`
        ).join('');
        countSpan.textContent = `${activeStates.size}州を選択中`;
      }
    }

    function toggleConf(conf) {
      if (activeConfs.has(conf)) activeConfs.delete(conf);
      else activeConfs.add(conf);
      updateConfButtons();
      currentPage = 1;
      applyFilters();
    }

    function clearConfs() {
      activeConfs.clear();
      updateConfButtons();
      currentPage = 1;
      applyFilters();
    }

    function updateConfButtons() {
      document.querySelectorAll('.conf-btn').forEach(btn => {
        const active = activeConfs.has(btn.dataset.conf);
        btn.classList.toggle('bg-blue-500', active);
        btn.classList.toggle('text-white', active);
        btn.classList.toggle('bg-slate-100', !active);
      });
    }

    // ===== メインフィルター処理 =====
    function applyFilters() {
      const search = document.getElementById('searchInput').value.toLowerCase().trim();

      filtered = ALL_DATA.filter(u => {
        if (activeDivs.size > 0 && !activeDivs.has(u.level)) return false;
        if (activeStates.size > 0 && !activeStates.has(u.state)) return false;
        if (activeConfs.size > 0 && !activeConfs.has(u.conf)) return false;
        if (search) {
          const haystack = `${u.name} ${u.conf} ${u.state} ${u.level}`.toLowerCase();
          return haystack.includes(search);
        }
        return true;
      });

      // ソート
      filtered.sort((a, b) => {
        let va = a[currentSort.key] || '';
        let vb = b[currentSort.key] || '';
        if (typeof va === 'number') return currentSort.asc ? va - vb : vb - va;
        return currentSort.asc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
      });

      updateStats();
      renderTable();
    }

    // ===== ソート =====
    function sortBy(key) {
      if (currentSort.key === key) currentSort.asc = !currentSort.asc;
      else { currentSort.key = key; currentSort.asc = true; }
      applyFilters();
    }

    // ===== 統計更新 =====
    function updateStats() {
      const total = ALL_DATA.length;
      const coaches = filtered.reduce((s, u) => s + (u.coaches || 0), 0);
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statFiltered').textContent = filtered.length;
      document.getElementById('statCoaches').textContent = coaches;
    }

    // ===== テーブル描画 =====
    function renderTable() {
      const start = (currentPage - 1) * PER_PAGE;
      const page = filtered.slice(start, start + PER_PAGE);
      const totalPages = Math.ceil(filtered.length / PER_PAGE);

      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = page.map((u, i) => `
        <tr class="table-row border-b border-slate-100 fade-in">
          <td class="px-4 py-3">
            <div class="font-medium text-slate-800">${u.name}</div>
          </td>
          <td class="px-3 py-3 text-center">
            <span class="px-2 py-0.5 rounded text-xs font-bold ${u.level === 'D1' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-800'}">${u.level}</span>
          </td>
          <td class="px-3 py-3 text-slate-600">${u.conf}</td>
          <td class="px-3 py-3 text-center">
            <span class="px-2 py-0.5 rounded text-xs font-medium bg-slate-100 text-slate-700">${u.state}</span>
          </td>
          <td class="px-3 py-3 text-center font-bold text-slate-800">${u.coaches || '-'}</td>
        </tr>
      `).join('');

      document.getElementById('tablePageInfo').textContent = `${filtered.length}件中 ${start + 1}〜${Math.min(start + PER_PAGE, filtered.length)}件を表示 (${currentPage}/${totalPages}ページ)`;
      document.getElementById('prevBtn').disabled = currentPage <= 1;
      document.getElementById('nextBtn').disabled = currentPage >= totalPages;
    }

    // ===== ページネーション =====
    function changePage(dir) {
      const totalPages = Math.ceil(filtered.length / PER_PAGE);
      currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
      renderTable();
    }

    // ===== 表示件数変更 =====
    function changePerPage() {
      const select = document.getElementById('perPageSelect');
      PER_PAGE = parseInt(select.value);
      currentPage = 1;
      renderTable();
    }

    // ===== エクスポート =====
    function exportCSV() {
      const header = 'Name,Division,Conference,State,Coaches';
      const rows = filtered.map(u => `"${u.name}",${u.level},"${u.conf}",${u.state},${u.coaches || ''}`);
      const csv = [header, ...rows].join('\n');
      downloadFile(csv, 'athletegate_data.csv', 'text/csv');
    }

    function exportJSON() {
      const json = JSON.stringify(filtered, null, 2);
      downloadFile(json, 'athletegate_data.json', 'application/json');
    }

    function downloadFile(content, filename, type) {
      const blob = new Blob([content], { type: type + ';charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    // ===== 検索のリアルタイム反映 =====
    document.getElementById('searchInput').addEventListener('input', () => {
      currentPage = 1;
      applyFilters();
    });

    // ===== 起動 =====
    loadData();
  </script>
</body>
</html>
